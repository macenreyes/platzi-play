services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    container_name: postgres-db
    environment:
      POSTGRES_DB: platzi_play_db
      POSTGRES_USER: macendales
      POSTGRES_PASSWORD: macendales.platzi
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

